<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>U.S. Solid CSS Product Detail Builder</title>
  <style>
    :root {
      --bg: #f5f6f5;
      --card: #fff;
      --text: #202624;
      --muted: #5f6c68;
      --line: #dfe5e2;
      --soft: #f2f2f2;
      --green: #0f766e;
      --green-dark: #0b5f58;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.55 Arial, "Microsoft YaHei", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    .app {
      width: min(1420px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 30px; line-height: 1.2; }
    .hint { margin: 4px 0 0; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: minmax(390px, .9fr) minmax(460px, 1.1fr);
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }
    h2 { margin: 0; font-size: 18px; }
    .body { padding: 16px; }
    .form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .field { display: grid; gap: 5px; min-width: 0; }
    .full { grid-column: 1 / -1; }
    label { font-weight: 700; font-size: 13px; }
    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid #cbd5d1;
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .12);
    }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }
    .btn.primary:hover { background: var(--green-dark); }
    .sections {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .sec {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .sec-bar {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #fbfcfb;
      border-bottom: 1px solid var(--line);
    }
    .sec-bar input[type="checkbox"] {
      width: 16px;
      height: 16px;
      min-height: 0;
      padding: 0;
      accent-color: var(--green);
    }
    .sec-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    .sec textarea { min-height: 72px; }
    .small { color: var(--muted); font-size: 12px; }
    .table-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .table-tools button,
    .row-del {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .edit-table-wrap {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .edit-table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
    }
    .edit-table td {
      min-width: 120px;
      border: 1px solid #d8e0dc;
      padding: 6px 8px;
      background: #fff;
      outline: none;
      vertical-align: top;
    }
    .edit-table td:first-child {
      background: #f2f2f2;
      font-weight: 700;
    }
    .edit-table td:focus {
      box-shadow: inset 0 0 0 2px rgba(15, 118, 110, .28);
    }
    .edit-table .action-cell {
      min-width: 72px;
      width: 72px;
      text-align: center;
      background: #fbfcfb;
    }
    .code {
      min-height: 430px;
      white-space: pre;
      font: 12px/1.45 Consolas, "Courier New", monospace;
    }
    .preview {
      max-height: 620px;
      overflow: auto;
      padding: 16px;
    }
    .status {
      min-height: 20px;
      color: var(--green);
      font-weight: 700;
      font-size: 13px;
      margin-top: 8px;
    }
    .right { position: sticky; top: 12px; display: grid; gap: 14px; }
    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
      .right { position: static; }
    }
    @media (max-width: 680px) {
      .app { width: min(100vw - 16px, 680px); padding-top: 12px; }
      .top, .head { align-items: stretch; flex-direction: column; }
      .form, .sec-body { grid-template-columns: 1fr; }
      .sec-bar { grid-template-columns: 24px minmax(0, 1fr); }
      .btns .btn { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>CSS 版产品详情页生成器</h1>
        <p class="hint">选择 SKU 前缀，勾选区块，填写文字 / 图片链接，生成更短、更方便修改的 Shopify HTML。</p>
      </div>
      <div class="btns">
        <button class="btn" id="loadSample" type="button">载入示例</button>
        <button class="btn primary" id="copyTop" type="button">复制 HTML</button>
      </div>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="head">
          <h2>输入内容</h2>
          <span class="small" id="countText"></span>
        </div>
        <div class="body">
          <div class="form">
            <div class="field">
              <label for="prefix">产品 SKU 前缀</label>
              <select id="prefix"></select>
            </div>
            <div class="field">
              <label for="model">产品型号 / SKU</label>
              <input id="model" placeholder="JFMSV00205">
            </div>
            <div class="field full">
              <label for="title">产品标题</label>
              <input id="title" placeholder="Motorized Ball Valve - 1/2&quot; Brass...">
            </div>
            <div class="field full">
              <label for="cover">详情页首图 URL</label>
              <input id="cover" placeholder="https://.../coverimage.png">
            </div>
          </div>

          <div class="sections" id="sections"></div>

          <div class="btns" style="margin-top:12px">
            <button class="btn" id="addCustom" type="button">增加自定义区块</button>
            <button class="btn" id="selectAll" type="button">全选</button>
            <button class="btn" id="selectNone" type="button">取消全选</button>
          </div>
        </div>
      </section>

      <div class="right">
        <section class="panel">
          <div class="head">
            <h2>生成 HTML</h2>
            <div class="btns">
              <button class="btn" id="download" type="button">下载</button>
              <button class="btn primary" id="copy" type="button">复制</button>
            </div>
          </div>
          <div class="body">
            <textarea id="output" class="code" readonly spellcheck="false"></textarea>
            <div class="status" id="status"></div>
          </div>
        </section>

        <section class="panel">
          <div class="head">
            <h2>预览</h2>
            <span class="small">实际效果仍以 Shopify 主题为准</span>
          </div>
          <div class="preview" id="preview"></div>
        </section>
      </div>
    </div>
  </main>

      JFMSV: {
        model: "JFMSV00205",
        title: "Motorized Ball Valve - 1/2 inch Brass Electrical Ball Valve with Manual Function",
        cover: "http://file.ussolid.com/content/Detailed%20Page/JFMSV/coverimage.png",
        images: {
          "Features": "http://file.ussolid.com/content/Detailed%20Page/JFMSV/3-wire-2.png",
          "Applications": "http://file.ussolid.com/content/Detailed%20Page/JFMSV/application.png",
          "CE CERTIFIED QUALITY & SAFETY": "http://file.ussolid.com/content/Detailed%20Page/CE/CE-EMC.jpg",
          "Valve Attributes": "http://file.ussolid.com/content/Detailed%20Page/JFMSV/valve%20model-Brass.png",
          "WIRING SCHEMATICS": "http://file.ussolid.com/content/Detailed%20Page/JFMSV/wiring-2.png",
          "CHEMICAL RESISTANCE CHART FOR BALL VALVE SEAL MATERIALS": "http://file.ussolid.com/content/Detailed%20Page/JFMSV/Material.png"
        }
      },
      JFSV: {
        model: "JFSV00402",
        title: "1/2 inch Smart Solenoid Valve - WiFi APP-Controlled Brass Solenoid Valve",
        cover: "",
        images: {}
      }
    };

    const defaults = {
      text: "Enter product description here.",
      table: "Model | USS-MODEL | Size | 1/2 inch\nMaterial | Brass | Voltage | 9-24V AC/DC\nSeal | PTFE | Rating | IP65",
      faq: "What should I check before purchase? | Confirm size, voltage, material, wiring type, pressure, temperature, and media compatibility."
    };

    const $ = (id) => document.getElementById(id);
    let customIndex = 1;

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    function attr(value) {
      return esc(value).replace(/`/g, "&#96;");
    }

    function lines(text) {
      return String(text || "").split(/\r?\n/).map(v => v.trim()).filter(Boolean);
    }

    function pipeRows(text) {
      return lines(text).map(line => line.split("|").map(v => v.trim()).filter(Boolean)).filter(row => row.length);
    }

    function className(title) {
      return String(title || "section").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "section";
    }

    function cloneRows(rows) {
      return JSON.parse(JSON.stringify(rows || []));
    }

    function defaultRowsFor(title) {
      const prefix = $("prefix") ? $("prefix").value : "JFMSV";
      return cloneRows((tableData[prefix] && tableData[prefix][title]) || pipeRows(defaults.table));
    }

    function tableEditorHtml(rows) {
      return `<div class="table-tools">
        <button type="button" class="table-add-row">新增行</button>
        <button type="button" class="table-add-col">新增列</button>
        <button type="button" class="table-del-col">删除最后一列</button>
      </div>
      <div class="edit-table-wrap">
        <table class="edit-table"><tbody>${editorRowsHtml(rows)}</tbody></table>
      </div>`;
    }

    function editorRowsHtml(rows) {
      const max = Math.max(1, ...rows.map(row => row.length));
      return rows.map(row => {
        const cells = [...row];
        while (cells.length < max) cells.push("");
        return `<tr>${cells.map(cell => `<td contenteditable="true">${esc(cell)}</td>`).join("")}<td class="action-cell"><button type="button" class="row-del">删除</button></td></tr>`;
      }).join("");
    }

    function getEditorRows(sec) {
      return [...sec.querySelectorAll(".edit-table tbody tr")].map(tr => {
        return [...tr.querySelectorAll("td:not(.action-cell)")].map(td => td.textContent.trim());
      }).filter(row => row.some(Boolean));
    }

    function setEditorRows(sec, rows) {
      const tbody = sec.querySelector(".edit-table tbody");
      if (!tbody) return;
      tbody.innerHTML = editorRowsHtml(rows.length ? rows : [[""]]);
    }

    function makeSection(title, checked = true) {
      const isImage = imageSections.test(title);
      const isTable = tableSections.test(title);
      const isFaq = faqSections.test(title);
      const tableRows = isTable ? defaultRowsFor(title) : [];
      const card = document.createElement("div");
      card.className = "sec";
      card.innerHTML = `
        <div class="sec-bar">
          <input type="checkbox" class="sec-on" ${checked ? "checked" : ""}>
          <input class="sec-title" value="${attr(title)}">
          <span class="small">${isTable ? "table" : isFaq ? "faq" : isImage ? "image" : "text"}</span>
        </div>
        <div class="sec-body">
          <div class="field">
            <label>${isTable ? "表格内容（直接编辑单元格）" : "文字内容"}</label>
            ${isTable ? tableEditorHtml(tableRows) : `<textarea class="sec-text" placeholder="${isFaq ? "Question | Answer" : "Section text"}">${isFaq ? defaults.faq : ""}</textarea>`}
          </div>
          <div class="field">
            <label>图片 URL（一行一个，可留空）</label>
            <textarea class="sec-img" placeholder="https://.../image.jpg"></textarea>
          </div>
        </div>`;
      card.querySelectorAll("input, textarea").forEach(el => {
        el.addEventListener("input", render);
        el.addEventListener("change", render);
      });
      card.addEventListener("input", event => {
        if (event.target.closest(".edit-table")) render();
      });
      card.addEventListener("click", event => {
        const sec = event.target.closest(".sec");
        if (!sec || !event.target.closest(".table-tools, .row-del")) return;
        const rows = getEditorRows(sec);
        const max = Math.max(1, ...rows.map(row => row.length));
        if (event.target.classList.contains("table-add-row")) {
          rows.push(Array.from({ length: max }, () => ""));
        }
        if (event.target.classList.contains("table-add-col")) {
          rows.forEach(row => row.push(""));
        }
        if (event.target.classList.contains("table-del-col") && max > 1) {
          rows.forEach(row => row.pop());
        }
        if (event.target.classList.contains("row-del")) {
          const index = [...sec.querySelectorAll(".edit-table tbody tr")].indexOf(event.target.closest("tr"));
          if (index >= 0) rows.splice(index, 1);
        }
        setEditorRows(sec, rows.length ? rows : [Array.from({ length: max }, () => "")]);
        render();
      });
      return card;
    }

    function loadPrefix(prefix) {
      $("sections").innerHTML = "";
      templates[prefix].forEach(title => $("sections").appendChild(makeSection(title, true)));
      const sample = samples[prefix];
      if (sample) {
        $("model").value = sample.model;
        $("title").value = sample.title;
        $("cover").value = sample.cover;
        document.querySelectorAll(".sec").forEach(sec => {
          const title = sec.querySelector(".sec-title").value;
          if (sample.images[title]) sec.querySelector(".sec-img").value = sample.images[title];
        });
      }
      render();
    }

    function sectionHtml(title, text, imageText, rows) {
      const imgs = lines(imageText);
      let body = "";
      if (faqSections.test(title)) {
        body += pipeRows(text).map(row => `<p class="uss-faq-q">${esc(row[0])}</p>\n<p class="uss-faq-a">${esc(row.slice(1).join(" | "))}</p>`).join("\n");
      } else if (tableSections.test(title)) {
        body += tableHtmlFromRows(rows, /OTHER|Other|All Options|Error Codes/i.test(title));
      } else {
        body += lines(text).map(line => `<p class="uss-text">${esc(line)}</p>`).join("\n");
      }
      if (imgs.length) {
        body += (body ? "\n" : "") + imgs.map((src, i) => `<img class="uss-img" src="${attr(src)}" alt="${attr(title)} ${i + 1}">`).join("\n");
      }
      if (!body.trim()) body = `<p class="uss-text">${esc(defaults.text)}</p>`;
      return `<section class="uss-section uss-${className(title)}">\n<h2 class="uss-title">${esc(title)}</h2>\n${body}\n</section>`;
    }

    function tableHtmlFromRows(rows, modelTable) {
      if (!rows.length) return "";
      const max = Math.max(...rows.map(row => row.length));
      return `<div class="uss-table-wrap">
<table class="uss-table${modelTable ? " uss-model-table" : ""}">
<tbody>
${rows.map(row => {
        const cells = [...row];
        while (cells.length < max) cells.push("");
        return `<tr>${cells.map((cell, i) => tableCell(cell, i, modelTable)).join("")}</tr>`;
      }).join("\n")}
</tbody>
</table>
</div>
<p class="uss-note">To view the full table on mobile, please swipe left or right on the screen.</p>`;
    }

    function tableCell(cell, index, modelTable) {
      const text = esc(cell);
      const url = String(cell || "").trim();
      const content = /^https?:\/\//i.test(url) ? `<a href="${attr(url)}" target="_blank" rel="noopener">View</a>` : text;
      if (!modelTable && index % 2 === 0) return `<th>${content}</th>`;
      if (modelTable && index === 0) return `<th>${content}</th>`;
      return `<td>${content}</td>`;
    }

    function buildHtml() {
      const cover = $("cover").value.trim();
      const title = $("title").value.trim();
      const model = $("model").value.trim();
      const prefix = $("prefix").value;
      const blocks = [];
      if (cover) blocks.push(`<img class="uss-hero" src="${attr(cover)}" alt="${attr(title || model || prefix)}">`);
      if (title || model) {
        blocks.push(`<section class="uss-section uss-product-head">
<h2 class="uss-title">${esc(title || model)}</h2>
${model ? `<p class="uss-text"><strong>Model:</strong> ${esc(model)}</p>` : ""}
</section>`);
      }
      document.querySelectorAll(".sec").forEach(sec => {
        if (!sec.querySelector(".sec-on").checked) return;
        blocks.push(sectionHtml(
          sec.querySelector(".sec-title").value,
          sec.querySelector(".sec-text") ? sec.querySelector(".sec-text").value : "",
          sec.querySelector(".sec-img").value,
          sec.querySelector(".edit-table") ? getEditorRows(sec) : []
        ));
      });
      return `${PDP_CSS}\n<div class="uss-pdp" data-sku-prefix="${attr(prefix)}">\n${blocks.join("\n\n")}\n</div>`;
    }

    function render() {
      const html = buildHtml();
      $("output").value = html;
      $("preview").innerHTML = html;
      const selected = [...document.querySelectorAll(".sec-on")].filter(x => x.checked).length;
      $("countText").textContent = `${selected} 个区块已选择`;
    }

    async function copyHtml() {
      try {
        await navigator.clipboard.writeText($("output").value);
      } catch {
        $("output").focus();
        $("output").select();
        document.execCommand("copy");
      }
      $("status").textContent = "HTML 已复制";
      setTimeout(() => $("status").textContent = "", 1800);
    }

    function downloadHtml() {
      const name = `${$("model").value.trim() || $("prefix").value}-css-detail.html`;
      const blob = new Blob([$("output").value], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    Object.keys(templates).forEach(prefix => {
      const option = document.createElement("option");
      option.value = prefix;
      option.textContent = prefix.replace("JF", "") + " / " + prefix;
      $("prefix").appendChild(option);
    });

    $("prefix").addEventListener("change", e => loadPrefix(e.target.value));
    ["model", "title", "cover"].forEach(id => $(id).addEventListener("input", render));
    $("copy").addEventListener("click", copyHtml);
    $("copyTop").addEventListener("click", copyHtml);
    $("download").addEventListener("click", downloadHtml);
    $("loadSample").addEventListener("click", () => loadPrefix($("prefix").value));
    $("addCustom").addEventListener("click", () => {
      $("sections").appendChild(makeSection(`Custom Section ${customIndex++}`, true));
      render();
    });
    $("selectAll").addEventListener("click", () => {
      document.querySelectorAll(".sec-on").forEach(x => x.checked = true);
      render();
    });
    $("selectNone").addEventListener("click", () => {
      document.querySelectorAll(".sec-on").forEach(x => x.checked = false);
      render();
    });

    loadPrefix("JFMSV");
  </script>
</body>
</html>
